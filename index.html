<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polinômio de Taylor</title>
    
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            margin-top: 10px;
            width: 100%;
        }

        th, td {
            border: 1px solid #000;
            padding: 6px 10px;
            text-align: center;
        }

        th {
            font-weight: bold;
        }

        h1, h2 {
            margin-bottom: 10px;
        }

        input, button {
            margin: 4px;
            padding: 4px;
        }

        #grafico {
            width: 100%;
            height: 450px;
        }

        .latex-display {
            margin-top: 10px;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>Polinômio de Taylor</h1>
        
        <div class="error" id="error"></div>
        
        <div class="controls">
            <div class="control-group">
                <label>Função f(x)</label>
                <input type="text" id="funcao" value="exp(-x^2)" placeholder="Ex: sin(x), cos(x), exp(x)">
            </div>
            <div class="control-group">
                <label>Ponto (a)</label>
                <input type="number" id="ponto" value="0" step="any">
            </div>
            <div class="control-group">
                <label>Ordem Máxima (n)</label>
                <input type="number" id="ordem" value="8" min="1" max="20">
            </div>
            <button onclick="calcular()">Calcular</button>
        </div>
        
        <div class="content">
            <div class="graph-section section">
                <h2>Gráfico</h2>
                <div id="grafico"></div>
            </div>
            
            <div class="section">
                <h2>Derivadas</h2>
                <table id="tabela"></table>
            </div>
            
            <div class="section">
                <h2>Expansão de Taylor</h2>
                <div id="expansao"></div>
            </div>
        </div>
    </div>
    
    <script>
        function calcular() {
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'none';
            
            try {
                const funcao = document.getElementById('funcao').value.trim();
                const ponto = parseFloat(document.getElementById('ponto').value);
                const ordem = parseInt(document.getElementById('ordem').value);
                
                if (!funcao) throw new Error('Insira uma função');
                if (isNaN(ponto)) throw new Error('Ponto inválido');
                if (isNaN(ordem) || ordem < 1) throw new Error('Ordem inválida');
                
                const derivadas = calcularDerivadas(funcao, ponto, ordem);
                
                renderizarTabela(derivadas, ponto);
                renderizarExpansao(derivadas, ponto, ordem);
                plotarGrafico(funcao, derivadas, ponto, ordem);
                
                MathJax.typesetPromise().catch(() => {});
                
            } catch (e) {
                errorDiv.textContent = '❌ ' + e.message;
                errorDiv.style.display = 'block';
            }
        }
        
        function calcularDerivadas(funcao, ponto, ordem) {
            const derivadas = [];
            const h = 0.00001;
            
            // Derivadas numéricas
            let expr = math.parse(funcao);

            for (let n = 0; n <= ordem; n++) {

                const valor = expr.evaluate({x:ponto});

                derivadas.push({
                    ordem:n,
                    valor:valor
                });

                expr = math.derivative(expr, 'x');
            }
                        
            return derivadas;
        }
        
        function renderizarTabela(derivadas, ponto) {
            let html = '<tr><th>n</th><th>f⁽ⁿ⁾(a)</th><th>Valor</th></tr>';
            
            derivadas.forEach(d => {
                const valor = Math.abs(d.valor) < 1e-10 ? '0' : 
                             Number.isInteger(d.valor) ? d.valor.toString() :
                             d.valor.toFixed(6);
                
                html += `<tr>
                    <td>${d.ordem}</td>
                    <td>f<sup>${d.ordem > 0 ? '('+d.ordem+')' : ''}</sup>(${ponto})</td>
                    <td>${valor}</td>
                </tr>`;
            });
            
            document.getElementById('tabela').innerHTML = html;
        }
        
        function renderizarExpansao(derivadas, ponto, ordem) {

            let html = `
            <table>
                <tr>
                    <th>Ordem</th>
                    <th>Polinômio de Taylor</th>
                </tr>
            `;

            for (let k = 0; k <= ordem; k++) {

                let termos = [];

                for (let i = 0; i <= k; i++) {

                    const coeff = derivadas[i].valor / fatorial(i);

                    let termo = '';

                    if (termos.length > 0 && coeff >= 0) termo += ' + ';
                    if (coeff < 0) termo += ' - ';

                    const abs = Math.abs(coeff);

                    let str;

                    if (abs < 1e-10) {
                        str = '0';
                    } else if (abs === 1 && i > 0) {
                        str = '';
                    } else {
                        str = Number.isInteger(abs)
                            ? abs.toString()
                            : abs.toFixed(4);
                    }

                    termo += str;

                    if (i === 1) {
                        termo += `(x-${ponto})`;
                    } else if (i > 1) {
                        termo += `(x-${ponto})^{${i}}`;
                    }

                    termos.push(termo);
                }

                html += `
                    <tr>
                        <td>\\(P_{${k}}(x)\\)</td>
                        <td>\\(${termos.join('')}\\)</td>
                    </tr>
                `;
            }

            html += `</table>`;

            document.getElementById("expansao").innerHTML = html;

            MathJax.typesetPromise();
        }
        
        function plotarGrafico(funcao, derivadas, ponto, ordem) {
            const xMin = ponto - 5;
            const xMax = ponto + 5;
            const xs = [];
            const yFunc = [];

            // Calcula a função original
            for (let i = 0; i <= 300; i++) {
                const x = xMin + (xMax - xMin) * i / 300;
                xs.push(x);

                try {
                    yFunc.push(math.evaluate(funcao, { x }));
                } catch {
                    yFunc.push(null);
                }
            }

            const traces = [];

            // Função original
            traces.push({
                x: xs,
                y: yFunc,
                mode: 'lines',
                name: 'f(x)',
                line: {
                    color: '#2563eb',
                    width: 2
                }
            });

            // Todos os polinômios de ordem par
            for (let k = 0; k <= ordem; k += 2) {

                const yTaylor = [];

                for (let i = 0; i <= 300; i++) {

                    const x = xs[i];

                    let yp = 0;

                    for (let n = 0; n <= k; n++) {
                        yp += (derivadas[n].valor / fatorial(n)) * Math.pow(x - ponto, n);
                    }

                    yTaylor.push(yp);
                }

                traces.push({
                    x: xs,
                    y: yTaylor,
                    mode: 'lines',
                    name: `P${k}(x)`,
                    line: {
                        width: 2,
                        dash: 'dash'
                    }
                });
            }

            const layout = {
                margin: { l: 50, r: 30, t: 30, b: 40 },
                hovermode: 'closest',
                showlegend: true,
                xaxis: { title: 'x' },
                yaxis: {
                    title: 'y',
                    range: [-5, 5]
                }
            };

            Plotly.newPlot('grafico', traces, layout, { responsive: true });
        }
        
        function fatorial(n) {
            if (n <= 1) return 1;
            let r = 1;
            for (let i = 2; i <= n; i++) r *= i;
            return r;
        }
        
        window.addEventListener('load', () => {
            setTimeout(calcular, 200);
        });
    </script>
</body>
</html>
